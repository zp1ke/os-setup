# Ghostty Configuration for Kubuntu (save as ~/.config/ghostty/config.ghostty)
# Follows KDE system light/dark theme automatically
# More info: https://ghostty.org/docs/config/reference

# Font
font-family = "FiraCode Nerd Font"
font-size = 14

# Appearance
theme = "light:Catppuccin Latte,dark:Catppuccin Frappe"
background-opacity = 0.95
window-padding-x = 4
window-padding-y = 4
cursor-style = block
window-width = 100
window-height = 25
window-decoration = auto

# Convenience
confirm-close-surface = false
scrollback-limit = 10000
